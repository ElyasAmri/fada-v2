[defaults]
inventory = inventory/hosts.yml
host_key_checking = False
timeout = 30
forks = 10
stdout_callback = default
result_format = yaml
interpreter_python = auto_silent

[ssh_connection]
ssh_args = -o ServerAliveInterval=60 -o ServerAliveCountMax=3 -o ConnectTimeout=15 -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no
pipelining = True
