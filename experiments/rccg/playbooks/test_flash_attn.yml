---
- name: Verify FA2 with Unsloth and restart training
  hosts: rccg
  gather_facts: no
  tasks:
    - name: Write Unsloth FA2 test
      copy:
        dest: /tmp/test_unsloth_fa2.py
        content: |
          import torch
          print("torch:", torch.__version__)
          import flash_attn
          print("flash-attn:", flash_attn.__version__)
          from unsloth import FastModel
          model, proc = FastModel.from_pretrained(
              "Qwen/Qwen2.5-VL-7B-Instruct",
              max_seq_length=4096,
              load_in_4bit=True,
              dtype=torch.bfloat16,
          )
          print("Model loaded successfully")
          print("GPU memory:", round(torch.cuda.max_memory_allocated()/1e9, 1), "GB")

    - name: Test Unsloth with FA2
      shell: |
        export HF_HOME=/mnt/models/huggingface
        eval "$(/home/ubuntu/miniconda3/bin/conda shell.bash hook)"
        conda activate ft-unsloth
        python /tmp/test_unsloth_fa2.py 2>&1
      register: test
      ignore_errors: true
      timeout: 300

    - name: Show result
      debug:
        msg: "{{ test.stdout }}"
