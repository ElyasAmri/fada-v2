---
- name: Check run statuses
  hosts: rccg
  gather_facts: no
  tasks:
    - name: List all runs
      shell: |
        for d in /mnt/models/fc-runs/*/; do
          name=$(basename "$d")
          if [ -f "${d}run_manifest.json" ]; then
            status=$(python3 -c "import json; m=json.load(open('${d}run_manifest.json')); print(m.get('status','?'), '|', round(m.get('training_time_seconds',0)/60,1), 'min', '|', m.get('final_loss','?'), '|', m.get('error','')[:60] if m.get('error') else '')" 2>/dev/null || echo "parse error")
            echo "$name: $status"
          else
            echo "$name: running/no manifest"
          fi
        done
        echo "=== GPU ==="
        nvidia-smi --query-compute-apps=pid,used_memory --format=csv,noheader 2>/dev/null || echo "clear"
      register: runs

    - name: Show
      debug:
        msg: "{{ runs.stdout }}"
