all:
  children:
    rccg:
      hosts:
        fada-1:
          ansible_host: 185.216.20.89
        fada-2:
          ansible_host: 69.19.136.239
        fada-3:
          ansible_host: 185.216.20.107
        fada-4:
          ansible_host: 185.216.20.44
        fada-5:
          ansible_host: 185.216.20.174
        fada-6:
          ansible_host: 185.216.20.119
        fada-7:
          ansible_host: 185.216.20.58
        fada-8:
          ansible_host: 185.216.20.239
        fada-recover:
          ansible_host: 38.80.122.231
      vars:
        ansible_user: ubuntu
        ansible_ssh_private_key_file: ~/.ssh/rccg_key
        # Volume: set volume_device per host after attaching in RCCG dashboard
        # Device path from dashboard, e.g.: /dev/disk/by-id/virtio-XXXXXXXX-XXXX-XXXX-X
        volume_mount: /mnt/models
        project_dir: /home/ubuntu/fada-v3
        data_dir: /home/ubuntu/fada-v3/data
        ultrasound_dir: /home/ubuntu/fada-v3/data/Fetal Ultrasound
        vllm_port: 8000
        vllm_max_model_len: 4096
        vllm_gpu_util: "0.9"
        vllm_enforce_eager: true
        cuda_home: /usr/local/cuda-12.8
        max_rpm: 600
        max_concurrent: 20
        gdrive_file_id: 15TFlu6NXSBbrskfyecdU7IHG6DyeJXpQ
        repo_url: https://github.com/ElyasAmri/fada-v2.git
        split: test
        total_test_images: 1894
        results_dir: /home/ubuntu/fada-results
        eval_log: /home/ubuntu/fada-results/eval_run.log
        vllm_log: /home/ubuntu/fada-results/vllm.log
        hf_token: "{{ lookup('env', 'HF_TOKEN') | default('', true) }}"
        # TODO(M10): Pin exact versions from cluster state for reproducibility
        pip_packages:
          - vllm
          - scikit-learn
          - sentence-transformers
          - openpyxl
          - bert-score
          - python-dotenv
          - num2words
